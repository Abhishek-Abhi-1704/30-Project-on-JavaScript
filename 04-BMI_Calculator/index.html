<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bmi-container">
    <h2>BMI Calculator</h2>
    <form action="">
        <input type="number" id="weight" placeholder="Enter your body weight">
       <input type="number" step="0.01" id="height"
            placeholder="Height in meters (e.g. 1.75)">
        <input type="button" id="btn" value="submit" onclick="calcBMI()">
    </form>
    <div id="res">Please enter Body weight and height</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
